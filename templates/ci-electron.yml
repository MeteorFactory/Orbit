name: CI Electron

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      package-manager:
        description: "Package manager to use (npm or pnpm)"
        type: string
        default: "npm"
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        type: string
        default: "10"
      os-matrix:
        description: "JSON array of runner OS labels"
        type: string
        default: '["macos-latest", "windows-latest"]'
      run-lint:
        description: "Run lint job"
        type: boolean
        default: true
      run-typecheck:
        description: "Run typecheck job"
        type: boolean
        default: true
      run-test:
        description: "Run test job"
        type: boolean
        default: true
      run-build:
        description: "Run build job"
        type: boolean
        default: true

jobs:
  lint:
    if: ${{ inputs.run-lint }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run lint

  typecheck:
    if: ${{ inputs.run-typecheck }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run typecheck

  test:
    if: ${{ inputs.run-test }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run test

  build:
    if: ${{ inputs.run-build }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run build
