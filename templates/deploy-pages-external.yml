name: Deploy to External GitHub Pages

on:
  workflow_call:
    inputs:
      path:
        description: "Path to the static files to deploy"
        type: string
        required: true
      target-repo:
        description: "Target repository (owner/repo) to deploy Pages to"
        type: string
        required: true
      target-branch:
        description: "Branch to push static files to"
        type: string
        default: "gh-pages"
      enable-tagging:
        description: "Create an incremental version tag on each deploy"
        type: boolean
        default: false
      site-name:
        description: "Site name to prefix tags with (e.g. singularity → singularity/v0.0.X)"
        type: string
        default: ""
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      package-manager:
        description: "Package manager to use (npm or pnpm)"
        type: string
        default: "npm"
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        type: string
        default: "10"
      build-command:
        description: "Build command to run before deploying"
        type: string
        default: ""
    secrets:
      APP_ID:
        description: "GitHub App ID for cross-repo access"
        required: false
      APP_PRIVATE_KEY:
        description: "GitHub App private key for cross-repo access"
        required: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: |
          rm -f "$(command -v pnpm)" "$(command -v pnpx)" 2>/dev/null || true
          corepack enable pnpm || true
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}

      - name: Extract target repo name
        id: target
        run: echo "repo=$(echo '${{ inputs.target-repo }}' | cut -d/ -f2)" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.target.outputs.repo }}

      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}

      - name: Determine next version
        id: version
        if: ${{ inputs.enable-tagging }}
        run: |
          PREFIX="${{ inputs.site-name }}"
          if [ -n "$PREFIX" ]; then
            PATTERN="${PREFIX}/v0.0.*"
            SED_STRIP="${PREFIX}/v0\\.0\\."
          else
            PATTERN="v0.0.*"
            SED_STRIP="v0\\.0\\."
          fi
          LATEST_TAG=$(git tag -l "$PATTERN" --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="0.0.1"
          else
            PATCH=$(echo "$LATEST_TAG" | sed "s|${SED_STRIP}||")
            NEXT="0.0.$((PATCH + 1))"
          fi
          if [ -n "$PREFIX" ]; then
            TAG="${PREFIX}/v${NEXT}"
          else
            TAG="v${NEXT}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next deploy version: $TAG"

      - name: Deploy to external repo
        run: |
          cd ${{ inputs.path }}
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b ${{ inputs.target-branch }}
          git add -A
          git commit -m "deploy: update pages from ${{ github.repository }}@${{ github.sha }}"
          # GitHub occasionally rejects pushes with a transient
          # "remote: fatal error in commit_refs" — retry with backoff so a
          # single server-side blip does not fail the whole deploy.
          for attempt in 1 2 3; do
            if git push --force "https://x-access-token:${DEPLOY_TOKEN}@github.com/${{ inputs.target-repo }}.git" ${{ inputs.target-branch }}; then
              exit 0
            fi
            echo "::warning::branch push attempt $attempt failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::branch push failed after 3 attempts"
          exit 1
        env:
          DEPLOY_TOKEN: ${{ steps.app-token.outputs.token || github.token }}

      - name: Create deploy tag
        if: ${{ inputs.enable-tagging }}
        run: |
          git tag ${{ steps.version.outputs.tag }}
          # Same transient "fatal error in commit_refs" can hit tag pushes —
          # retry with backoff so we do not lose the deploy version.
          for attempt in 1 2 3; do
            if git push origin ${{ steps.version.outputs.tag }}; then
              exit 0
            fi
            echo "::warning::tag push attempt $attempt failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::tag push failed after 3 attempts"
          exit 1
