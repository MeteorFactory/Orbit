# ============================================================================
# Sample: Docker build and push for a containerized application
# ============================================================================
#
# This workflow calls the reusable Docker Build template from
# MeteorFactory/Pipelines. It handles:
#   - Docker Buildx setup for multi-platform support
#   - Registry authentication
#   - Automatic image tagging (branch, PR, semver, SHA)
#   - Build caching via GitHub Actions cache (GHA)
#   - Push to container registry (skipped on PRs)
#
# Supported registries:
#   - ghcr.io (GitHub Container Registry) — default
#   - Docker Hub, Azure Container Registry, AWS ECR, etc.
#
# Prerequisites — Repository Secrets:
#   REGISTRY_USERNAME — Registry username (for ghcr.io, use your GitHub username)
#   REGISTRY_PASSWORD — Registry password or token (for ghcr.io, use a PAT with
#                       write:packages scope, or use ${{ secrets.GITHUB_TOKEN }})
#
# Usage:
#   Copy this file into your project at .github/workflows/build.yml
#   Adjust inputs (registry, image-name, dockerfile) to match your setup.
# ============================================================================

name: Docker Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  docker:
    uses: MeteorFactory/Pipelines/.github/workflows/docker-build.yml@main
    with:
      # Path to the Dockerfile relative to the repo root.
      # Default: "Dockerfile"
      dockerfile: "Dockerfile"

      # Docker build context — the directory sent to the Docker daemon.
      # Default: "." (repo root)
      context: "."

      # Container registry URL.
      # Default: "ghcr.io" (GitHub Container Registry)
      # For Docker Hub, use: "docker.io"
      # For Azure ACR, use: "myregistry.azurecr.io"
      registry: "ghcr.io"

      # Image name without the registry prefix.
      # The full image path will be: {registry}/{image-name}
      # For ghcr.io, use the pattern: {org-or-user}/{repo-name}
      image-name: "my-org/my-app"

    secrets:
      # Registry credentials.
      #
      # Option A — GitHub Container Registry (ghcr.io):
      #   Use GITHUB_TOKEN for same-repo packages (simplest setup).
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # Option B — Docker Hub:
      #   REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      #   REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      # Option C — Azure Container Registry:
      #   REGISTRY_USERNAME: ${{ secrets.ACR_USERNAME }}
      #   REGISTRY_PASSWORD: ${{ secrets.ACR_PASSWORD }}

    # Image tags are automatically generated by docker/metadata-action:
    #   - Branch push (main)  -> ghcr.io/my-org/my-app:main
    #   - PR #42              -> ghcr.io/my-org/my-app:pr-42
    #   - Tag v1.2.3          -> ghcr.io/my-org/my-app:1.2.3
    #                            ghcr.io/my-org/my-app:1.2
    #   - Every push          -> ghcr.io/my-org/my-app:<short-sha>
    #
    # Images are NOT pushed on pull requests (build-only for validation).
