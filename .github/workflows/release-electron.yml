name: Release Electron

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      package-manager:
        description: "Package manager to use (npm or pnpm)"
        type: string
        default: "npm"
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        type: string
        default: "10"
      channel:
        description: "Release channel: latest (stable) or alpha (pre-release)"
        type: string
        default: "latest"
      site-dispatch-repo:
        description: "Repository to notify via repository_dispatch when release is published (e.g. owner/repo)"
        type: string
        default: ""
      site-dispatch-event:
        description: "Event type for the repository_dispatch (e.g. meteor-release)"
        type: string
        default: ""
    secrets:
      MACOS_CERTIFICATE:
        description: "Base64-encoded macOS signing certificate (.p12)"
        required: false
      MACOS_CERTIFICATE_PWD:
        description: "Password for the macOS signing certificate"
        required: false
      APPLE_ID:
        description: "Apple ID for notarization"
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        description: "App-specific password for Apple notarization"
        required: false
      APPLE_TEAM_ID:
        description: "Apple Developer Team ID"
        required: false
      SITE_APP_ID:
        description: "GitHub App ID for cross-repo site dispatch"
        required: false
      SITE_APP_PRIVATE_KEY:
        description: "GitHub App private key for cross-repo site dispatch"
        required: false

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: [self-hosted, Linux]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          CHANNEL="${{ inputs.channel }}"
          VERSION=$(node -p "require('./package.json').version")
          MAJOR_MINOR=$(echo "$VERSION" | sed 's/\.[0-9]*$//')

          if [ "$CHANNEL" = "alpha" ]; then
            LATEST_ALPHA=$(git tag -l "v${MAJOR_MINOR}.*-alpha.*" | sort -V | tail -1)
            if [ -z "$LATEST_ALPHA" ]; then
              NEXT_VERSION="${VERSION}-alpha.1"
            else
              ALPHA_NUM=$(echo "$LATEST_ALPHA" | sed 's/.*-alpha\.//')
              NEXT_ALPHA=$((ALPHA_NUM + 1))
              BASE=$(echo "$LATEST_ALPHA" | sed 's/-alpha\..*//' | sed 's/^v//')
              NEXT_VERSION="${BASE}-alpha.${NEXT_ALPHA}"
            fi
          else
            LATEST_TAG=$(git tag -l "v${MAJOR_MINOR}.*" | grep -v '\-' | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              NEXT_VERSION="$VERSION"
            else
              LATEST_PATCH=$(echo "$LATEST_TAG" | sed "s/v${MAJOR_MINOR}\.//")
              NEXT_PATCH=$((LATEST_PATCH + 1))
              NEXT_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}"
            fi
          fi

          TAG="v${NEXT_VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG (channel: $CHANNEL)"

      - name: Get last commit author
        id: author
        run: |
          echo "name=$(git log -1 --format='%an')" >> "$GITHUB_OUTPUT"
          echo "email=$(git log -1 --format='%ae')" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "${{ steps.author.outputs.name }}"
          git config user.email "${{ steps.author.outputs.email }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  release-mac:
    needs: [prepare-release]
    runs-on: [self-hosted, macOS]
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Set version in package.json
        run: ${{ inputs.package-manager }} version ${{ needs.prepare-release.outputs.version }} --no-git-tag-version --allow-same-version

      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}

      - name: Build renderer + main
        run: ${{ inputs.package-manager }} run build

      - name: Verify signing credentials
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::error::MACOS_CERTIFICATE secret is required for release builds."
            exit 1
          fi
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::APPLE_TEAM_ID secret is required for notarization."
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Electron app and publish (arm64 + x64)
        run: npx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-win:
    needs: [prepare-release]
    runs-on: [self-hosted, Windows]
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Set version in package.json
        shell: bash
        run: ${{ inputs.package-manager }} version ${{ needs.prepare-release.outputs.version }} --no-git-tag-version --allow-same-version

      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}

      - name: Build renderer + main
        run: ${{ inputs.package-manager }} run build

      - name: Build Electron app and publish (Windows x64)
        shell: bash
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}

  finalize-release:
    needs: [prepare-release, release-mac, release-win]
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        id: notes
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          CHANNEL="${{ needs.prepare-release.outputs.channel }}"
          if [ "$CHANNEL" = "alpha" ]; then
            # For alpha: diff against previous alpha tag, or latest stable if none exists
            PREV_TAG=$(git tag -l 'v*-alpha.*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v '\-' | head -1)
            fi
          else
            PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v '\-' | grep -v "^${TAG}$" | head -1)
          fi
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "## What's Changed"
            echo ""

            # Group commits by conventional commit type
            for type_label in "feat:Features" "fix:Bug Fixes" "perf:Performance" "docs:Documentation" "refactor:Refactoring" "chore:Maintenance"; do
              TYPE="${type_label%%:*}"
              LABEL="${type_label##*:}"
              COMMITS=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" --grep="^${TYPE}" 2>/dev/null || true)
              if [ -n "$COMMITS" ]; then
                echo "### $LABEL"
                echo ""
                echo "$COMMITS"
                echo ""
              fi
            done

            # Ungrouped commits (no conventional prefix)
            OTHER=$(git log "$RANGE" --no-merges --pretty=format:"%s|%h" 2>/dev/null | grep -vE "^(feat|fix|perf|docs|refactor|chore|build|ci|test|style)(\(.*\))?:" || true)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo ""
              echo "$OTHER" | while IFS='|' read -r msg hash; do
                echo "- $msg ($hash)"
              done
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${TAG}"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update release notes
        run: |
          gh release edit "${{ needs.prepare-release.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --notes "${{ steps.notes.outputs.body }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clean up release assets (remove blockmaps)
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          for asset in $(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' | grep '\.blockmap$'); do
            echo "Removing $asset"
            gh release delete-asset "$TAG" "$asset" --repo "$GITHUB_REPOSITORY" --yes
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish release (draft -> public)
        run: |
          CHANNEL="${{ needs.prepare-release.outputs.channel }}"
          FLAGS="--draft=false"
          if [ "$CHANNEL" = "alpha" ]; then
            FLAGS="$FLAGS --prerelease"
          fi
          gh release edit ${{ needs.prepare-release.outputs.tag }} --repo "$GITHUB_REPOSITORY" $FLAGS
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate cross-repo token for site dispatch
        id: site-token
        if: ${{ inputs.site-dispatch-repo != '' && inputs.site-dispatch-event != '' }}
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.SITE_APP_ID }}
          private-key: ${{ secrets.SITE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.site-dispatch-repo }}

      - name: Notify site to rebuild
        if: ${{ steps.site-token.outcome == 'success' }}
        run: |
          gh api repos/${{ github.repository_owner }}/${{ inputs.site-dispatch-repo }}/dispatches \
            -f event_type="${{ inputs.site-dispatch-event }}" \
            -f "client_payload[tag]=${{ needs.prepare-release.outputs.tag }}" \
            -f "client_payload[channel]=${{ needs.prepare-release.outputs.channel }}"
        env:
          GH_TOKEN: ${{ steps.site-token.outputs.token }}
