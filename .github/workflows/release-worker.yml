name: Deploy Cloudflare Worker

on:
  workflow_call:
    inputs:
      worker-name:
        description: "Cloudflare Worker name"
        type: string
        required: true
      wrangler-env:
        description: "Deployment environment (production/staging)"
        type: string
        default: "production"
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      dry-run:
        description: "Run deploy in dry-run mode (no actual deployment)"
        type: boolean
        default: false
      pre-deploy-script:
        description: "Optional script to run before deploy (e.g., config generation)"
        type: string
        default: ""
      integration-test-collection:
        description: "Path to a Postman/Newman collection for post-deploy integration tests"
        type: string
        default: ""
      integration-test-url:
        description: "Base URL to test against (e.g., https://my-worker.workers.dev)"
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare API token with Workers permissions"
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: "Cloudflare account ID"
        required: true
      INTEGRATION_TEST_API_KEY:
        description: "API key for integration tests (optional)"
        required: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Pre-deploy setup
        if: ${{ inputs.pre-deploy-script != '' }}
        run: |
          chmod +x ${{ inputs.pre-deploy-script }}
          ./${{ inputs.pre-deploy-script }}

      - name: Deploy
        if: ${{ !inputs.dry-run }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Dry run
        if: ${{ inputs.dry-run }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run

      - name: Integration tests
        if: ${{ inputs.integration-test-collection != '' && !inputs.dry-run }}
        run: |
          npx newman run ${{ inputs.integration-test-collection }} \
            --env-var "baseUrl=${{ inputs.integration-test-url }}" \
            --env-var "apiKey=${{ secrets.INTEGRATION_TEST_API_KEY }}" \
            --delay-request 500
