        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libgbm1 libgtk-3-0 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 \
            libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0 libx11-xcb1 libxss1 \
            libxtst6 xdg-utils \
          || sudo apt-get install -y --no-install-recommends \
            libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libgbm1 libgtk-3-0t64 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 \
            libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0t64 libx11-xcb1 libxss1 \
            libxtst6 xdg-utils
          sudo ldconfig
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: |
          rm -f "$(command -v pnpm)" "$(command -v pnpx)" 2>/dev/null || true
          corepack enable pnpm || true
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
          package-manager-cache: ${{ matrix.os != 'self-hosted' }}
      # Retry installs: native-module postinstall scripts (electron, etc.)
      # download binaries over the network and intermittently fail with
      # transient errors ("socket hang up", request timed out). One blip
      # must not fail the whole pipeline.
      - name: Install dependencies (npm)
        if: ${{ inputs.package-manager == 'npm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Install dependencies (pnpm)
        if: ${{ inputs.package-manager == 'pnpm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            pnpm install --frozen-lockfile && exit 0
            echo "::warning::pnpm install attempt $attempt failed, retrying in 15s..."
            # A failed attempt can leave a dependency half-built — e.g.
            # electron's postinstall aborts mid binary-download on a
            # transient "socket hang up". pnpm does NOT re-run that
            # postinstall on the next `pnpm install`: the package is
            # already linked into node_modules, so the retry "succeeds"
            # with electron's binary still missing and the e2e job later
            # dies with "Electron failed to install correctly" (Release
            # Alpha run #266). Wipe node_modules so the retry is a clean
            # install that re-runs every postinstall. The pnpm store and
            # the Electron binary cache survive, so it stays a fast relink.
            rm -rf node_modules
            sleep 15
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1
      - run: ${{ inputs.package-manager }} run build
      - uses: actions/upload-artifact@v5
        if: ${{ inputs.artifact-path != '' }}
        with:
          name: build-${{ matrix.os }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 9

  e2e:
    if: ${{ inputs.run-e2e }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - name: Clean workspace
        # Only the previous build's working files are removed here. The
        # Electron binary cache (~/Library/Caches/electron, ~/.cache/electron)
        # is intentionally KEPT: wiping it forced every self-hosted run to
        # re-download Electron, and concurrent jobs sharing a runner host
        # exhausted the connection ("socket hang up"). The cache is keyed by
        # Electron version and integrity-checked, so stale entries are harmless.
        run: rm -rf node_modules dist out .tsbuildinfo coverage tmp
      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libgbm1 libgtk-3-0 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 \
            libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0 libx11-xcb1 libxss1 \
            libxtst6 xvfb xdg-utils sqlite3 \
          || sudo apt-get install -y --no-install-recommends \
            libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libgbm1 libgtk-3-0t64 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 \
            libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0t64 libx11-xcb1 libxss1 \
            libxtst6 xvfb xdg-utils sqlite3
          sudo ldconfig
      - name: Configure git identity for e2e tests
        run: |
          git config --global user.email "ci@github-actions.local"
          git config --global user.name "GitHub Actions"
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: |
          rm -f "$(command -v pnpm)" "$(command -v pnpx)" 2>/dev/null || true
          corepack enable pnpm || true
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
          package-manager-cache: ${{ matrix.os != 'self-hosted' }}
      # Retry installs: native-module postinstall scripts (electron, etc.)
      # download binaries over the network and intermittently fail with
      # transient errors ("socket hang up", request timed out). One blip
      # must not fail the whole pipeline.
      - name: Install dependencies (npm)
        if: ${{ inputs.package-manager == 'npm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Install dependencies (pnpm)
        if: ${{ inputs.package-manager == 'pnpm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            pnpm install --frozen-lockfile && exit 0
            echo "::warning::pnpm install attempt $attempt failed, retrying in 15s..."
            # A failed attempt can leave a dependency half-built — e.g.
            # electron's postinstall aborts mid binary-download on a
            # transient "socket hang up". pnpm does NOT re-run that
            # postinstall on the next `pnpm install`: the package is
            # already linked into node_modules, so the retry "succeeds"
            # with electron's binary still missing and the e2e job later
            # dies with "Electron failed to install correctly" (Release
            # Alpha run #266). Wipe node_modules so the retry is a clean
            # install that re-runs every postinstall. The pnpm store and
            # the Electron binary cache survive, so it stays a fast relink.
            rm -rf node_modules
            sleep 15
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run e2e tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Release Alpha runs #337/#338/#339 all blocked on this step.
          # The Linux e2e step previously was a raw `xvfb-run -- pnpm test:e2e`
          # invocation with no per-attempt timeout, no heartbeat, no diag dump
          # and no retry loop. That is safe on GitHub-hosted ubuntu-latest
          # runners but Release Alpha pins `os-matrix: '["self-hosted"]'`,
          # which schedules the e2e on a Neutron-provisioned self-hosted Linux
          # runner that shares the host with build-linux. A single hung
          # Playwright/Electron startup then consumes the whole 30-min job
          # budget, the retry loop never gets to retry, and one transient
          # runner-agent blip fails the whole pipeline.
          #
          # Three guard rails (the caffeinate wrap is macOS-only and does not
          # apply here — Linux has no App Nap):
          #   1. `diag` dumps runner state before the run and after every
          #      failed attempt so a future runner death leaves actionable
          #      data instead of vanishing into the runner-agent crash.
          #   2. `timeout --kill-after=30s 12m` caps each attempt so a single
          #      hung Playwright invocation cannot burn the whole job budget.
          #   3. `start_heartbeat` emits a stdout line every 30s as a
          #      belt-and-braces keep-alive AND a per-minute trail so the
          #      next runner death pins down WHERE progress stopped.
          diag() {
            echo "::group::Runner state ($1)"
            uname -a
            echo "runner: ${RUNNER_NAME:-?} workspace: ${RUNNER_WORKSPACE:-?}"
            uptime || true
            free -m || true
            df -h . || true
            echo "::endgroup::"
          }
          heartbeat_pid=""
          start_heartbeat() {
            (
              while true; do
                sleep 30
                ts=$(date -u +%H:%M:%S)
                free_kb=$(awk '/MemAvailable/ {print $2}' /proc/meminfo 2>/dev/null)
                printf '[heartbeat %s] alive — MemAvailable=%s kB\n' "$ts" "${free_kb:-?}"
              done
            ) &
            heartbeat_pid=$!
          }
          stop_heartbeat() {
            if [ -n "$heartbeat_pid" ]; then
              kill "$heartbeat_pid" 2>/dev/null || true
              wait "$heartbeat_pid" 2>/dev/null || true
              heartbeat_pid=""
            fi
          }
          trap stop_heartbeat EXIT
          diag "before-e2e"
          for attempt in 1 2; do
            start_heartbeat
            timeout --kill-after=30s 12m \
              xvfb-run --auto-servernum -- ${{ inputs.package-manager }} run test:e2e && { stop_heartbeat; exit 0; }
            status=$?
            stop_heartbeat
            echo "::warning::e2e attempt $attempt failed (exit $status), retrying in 15s..."
            diag "after-attempt-$attempt-failed"
            sleep 15
          done
          echo "::error::e2e tests failed after 2 attempts"
          exit 1
      - name: Run e2e tests (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Self-hosted macOS Tart VMs that host parallel CI jobs go silent
          # during Playwright + Electron startup (long app-boot / page-load
          # phases produce no stdout). If the host enters idle/disk sleep
          # the runner agent loses its WebSocket and the step ends in
          # `failure` with logId=null and `result: in_progress` — same
          # signature as Release Alpha #281/#290 around electron-builder,
          # and the failure mode that killed Release Alpha #321 (e2e step
          # exited at 12m54s with no log surface). Mirror the four guard
          # rails proven on the electron-builder steps in release-alpha.yml:
          #   1. `diag` dumps runner state before/after each attempt so a
          #      future runner death leaves actionable data (memory, disk,
          #      runner name, VM uptime) instead of vanishing into the
          #      runner-agent crash.
          #   2. `$TIMEOUT_BIN --kill-after=30s 12m` caps each attempt so
          #      a single hung Playwright invocation cannot burn the whole
          #      30-min job budget — without this the retry loop never
          #      gets to retry.
          #   3. `caffeinate -i -m` wraps each attempt, blocking macOS
          #      idle-sleep and disk-idle assertions for its duration so
          #      the host cannot be suspended out from under the runner
          #      agent while Playwright/Electron is silent.
          #   4. `start_heartbeat` emits a stdout line every 30s as a
          #      belt-and-braces keep-alive AND a per-minute trail so the
          #      next runner death pins down WHERE progress stopped.
          # macOS doesn't ship a GNU `timeout`; install coreutils via
          # Homebrew once if missing and prefer `gtimeout`.
          # `HOMEBREW_NO_AUTO_UPDATE=1` prevents parallel matrix jobs from
          # colliding on Homebrew's `vendor-install ruby` lockfile (same
          # rationale as the brew-install retry in release-alpha.yml).
          if ! command -v gtimeout >/dev/null 2>&1 && ! command -v timeout >/dev/null 2>&1; then
            for try in 1 2 3; do
              if HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 \
                  brew install coreutils >/dev/null 2>&1; then
                break
              fi
              sleep $((RANDOM % 10 + try * 5))
            done
          fi
          TIMEOUT_BIN=$(command -v gtimeout || command -v timeout || true)
          if [ -z "$TIMEOUT_BIN" ]; then
            echo "::error::No timeout/gtimeout available — install coreutils on the runner image"
            exit 1
          fi
          diag() {
            echo "::group::Runner state ($1)"
            uname -a
            echo "runner: ${RUNNER_NAME:-?} workspace: ${RUNNER_WORKSPACE:-?}"
            uptime || true
            vm_stat | awk '/Pages free|Pages active|Pages inactive|Pages speculative|Pages wired/ {print}' || true
            df -h . || true
            echo "::endgroup::"
          }
          heartbeat_pid=""
          start_heartbeat() {
            (
              while true; do
                sleep 30
                ts=$(date -u +%H:%M:%S)
                free=$(vm_stat 2>/dev/null | awk '/Pages free/ {print $3}' | tr -d '.')
                printf '[heartbeat %s] alive — free pages=%s\n' "$ts" "${free:-?}"
              done
            ) &
            heartbeat_pid=$!
          }
          stop_heartbeat() {
            if [ -n "$heartbeat_pid" ]; then
              kill "$heartbeat_pid" 2>/dev/null || true
              wait "$heartbeat_pid" 2>/dev/null || true
              heartbeat_pid=""
            fi
          }
          trap stop_heartbeat EXIT
          diag "before-e2e"
          for attempt in 1 2; do
            start_heartbeat
            caffeinate -i -m "$TIMEOUT_BIN" --kill-after=30s 12m \
              ${{ inputs.package-manager }} run test:e2e && { stop_heartbeat; exit 0; }
            status=$?
            stop_heartbeat
            echo "::warning::e2e attempt $attempt failed (exit $status), retrying in 15s..."
            diag "after-attempt-$attempt-failed"
            sleep 15
          done
          echo "::error::e2e tests failed after 2 attempts"
          exit 1
      - name: Run e2e tests (Windows)
        if: runner.os == 'Windows'
        run: ${{ inputs.package-manager }} run test:e2e
      - uses: actions/upload-artifact@v5
        if: ${{ always() && inputs.run-e2e }}
        with:
          name: e2e-results-${{ matrix.os }}
          path: test-results/
          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 9
          if-no-files-found: ignore
