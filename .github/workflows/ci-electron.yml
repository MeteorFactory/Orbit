name: CI Electron

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      package-manager:
        description: "Package manager to use (npm or pnpm)"
        type: string
        default: "npm"
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        type: string
        default: "10"
      os-matrix:
        description: "JSON array of runner OS labels"
        type: string
        default: '[["self-hosted", "macOS"], ["self-hosted", "Windows"]]'
      run-lint:
        description: "Run lint job"
        type: boolean
        default: true
      run-typecheck:
        description: "Run typecheck job"
        type: boolean
        default: true
      run-test:
        description: "Run test job"
        type: boolean
        default: true
      run-build:
        description: "Run build job"
        type: boolean
        default: true
      run-e2e:
        description: "Run e2e tests (Playwright + Electron)"
        type: boolean
        default: false

jobs:
  lint:
    if: ${{ inputs.run-lint }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run lint

  typecheck:
    if: ${{ inputs.run-typecheck }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run typecheck

  test:
    if: ${{ inputs.run-test }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run test

  build:
    if: ${{ inputs.run-build }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run build

  e2e:
    if: ${{ inputs.run-e2e }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run e2e tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum -- ${{ inputs.package-manager }} run test:e2e
      - name: Run e2e tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: ${{ inputs.package-manager }} run test:e2e
