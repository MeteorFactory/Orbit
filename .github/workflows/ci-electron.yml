name: CI Electron

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      package-manager:
        description: "Package manager to use (npm or pnpm)"
        type: string
        default: "npm"
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        type: string
        default: "10"
      os-matrix:
        description: "JSON array of runner OS labels"
        type: string
        default: '["macos-latest", "windows-latest"]'
      run-lint:
        description: "Run lint job"
        type: boolean
        default: true
      run-typecheck:
        description: "Run typecheck job"
        type: boolean
        default: true
      run-test:
        description: "Run test job"
        type: boolean
        default: true
      run-build:
        description: "Run build job"
        type: boolean
        default: true
      run-e2e:
        description: "Run e2e tests (Playwright + Electron)"
        type: boolean
        default: false
      artifact-path:
        description: "Path to upload as build artifact (e.g. dist/). Leave empty to skip upload"
        type: string
        default: ""
      artifact-retention-days:
        description: "Number of days to retain uploaded artifacts"
        type: number
        default: 1

jobs:
  lint:
    if: ${{ inputs.run-lint }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Clean workspace
        # Only the previous build's working files are removed here. The
        # Electron binary cache (~/Library/Caches/electron, ~/.cache/electron)
        # is intentionally KEPT: wiping it forced every self-hosted run to
        # re-download Electron, and concurrent jobs sharing a runner host
        # exhausted the connection ("socket hang up"). The cache is keyed by
        # Electron version and integrity-checked, so stale entries are harmless.
        run: rm -rf node_modules dist out .tsbuildinfo coverage tmp
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: |
          rm -f "$(command -v pnpm)" "$(command -v pnpx)" 2>/dev/null || true
          corepack enable pnpm || true
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
          package-manager-cache: ${{ matrix.os != 'self-hosted' }}
      # Retry installs: native-module postinstall scripts (electron, etc.)
      # download binaries over the network and intermittently fail with
      # transient errors ("socket hang up", request timed out). One blip
      # must not fail the whole pipeline.
      - name: Install dependencies (npm)
        if: ${{ inputs.package-manager == 'npm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Install dependencies (pnpm)
        if: ${{ inputs.package-manager == 'pnpm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            pnpm install --frozen-lockfile && exit 0
            echo "::warning::pnpm install attempt $attempt failed, retrying in 15s..."
            # A failed attempt can leave a dependency half-built — e.g.
            # electron's postinstall aborts mid binary-download on a
            # transient "socket hang up". pnpm does NOT re-run that
            # postinstall on the next `pnpm install`: the package is
            # already linked into node_modules, so the retry "succeeds"
            # with electron's binary still missing and the e2e job later
            # dies with "Electron failed to install correctly" (Release
            # Alpha run #266). Wipe node_modules so the retry is a clean
            # install that re-runs every postinstall. The pnpm store and
            # the Electron binary cache survive, so it stays a fast relink.
            rm -rf node_modules
            sleep 15
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1
      - run: ${{ inputs.package-manager }} run lint

  typecheck:
    if: ${{ inputs.run-typecheck }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Clean workspace
        # Only the previous build's working files are removed here. The
        # Electron binary cache (~/Library/Caches/electron, ~/.cache/electron)
        # is intentionally KEPT: wiping it forced every self-hosted run to
        # re-download Electron, and concurrent jobs sharing a runner host
        # exhausted the connection ("socket hang up"). The cache is keyed by
        # Electron version and integrity-checked, so stale entries are harmless.
        run: rm -rf node_modules dist out .tsbuildinfo coverage tmp
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: |
          rm -f "$(command -v pnpm)" "$(command -v pnpx)" 2>/dev/null || true
          corepack enable pnpm || true
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
          package-manager-cache: ${{ matrix.os != 'self-hosted' }}
      # Retry installs: native-module postinstall scripts (electron, etc.)
      # download binaries over the network and intermittently fail with
      # transient errors ("socket hang up", request timed out). One blip
      # must not fail the whole pipeline.
      - name: Install dependencies (npm)
        if: ${{ inputs.package-manager == 'npm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Install dependencies (pnpm)
        if: ${{ inputs.package-manager == 'pnpm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            pnpm install --frozen-lockfile && exit 0
            echo "::warning::pnpm install attempt $attempt failed, retrying in 15s..."
            # A failed attempt can leave a dependency half-built — e.g.
            # electron's postinstall aborts mid binary-download on a
            # transient "socket hang up". pnpm does NOT re-run that
            # postinstall on the next `pnpm install`: the package is
            # already linked into node_modules, so the retry "succeeds"
            # with electron's binary still missing and the e2e job later
            # dies with "Electron failed to install correctly" (Release
            # Alpha run #266). Wipe node_modules so the retry is a clean
            # install that re-runs every postinstall. The pnpm store and
            # the Electron binary cache survive, so it stays a fast relink.
            rm -rf node_modules
            sleep 15
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1
      - run: ${{ inputs.package-manager }} run typecheck

  test:
    if: ${{ inputs.run-test }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - name: Clean workspace
        # Only the previous build's working files are removed here. The
        # Electron binary cache (~/Library/Caches/electron, ~/.cache/electron)
        # is intentionally KEPT: wiping it forced every self-hosted run to
        # re-download Electron, and concurrent jobs sharing a runner host
        # exhausted the connection ("socket hang up"). The cache is keyed by
        # Electron version and integrity-checked, so stale entries are harmless.
        run: rm -rf node_modules dist out .tsbuildinfo coverage tmp
      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libgbm1 libgtk-3-0 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 \
            libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0 libx11-xcb1 libxss1 \
            libxtst6 xdg-utils \
          || sudo apt-get install -y --no-install-recommends \
            libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libgbm1 libgtk-3-0t64 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 \
            libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0t64 libx11-xcb1 libxss1 \
            libxtst6 xdg-utils
          sudo ldconfig
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: |
          rm -f "$(command -v pnpm)" "$(command -v pnpx)" 2>/dev/null || true
          corepack enable pnpm || true
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
          package-manager-cache: ${{ matrix.os != 'self-hosted' }}
      # Retry installs: native-module postinstall scripts (electron, etc.)
      # download binaries over the network and intermittently fail with
      # transient errors ("socket hang up", request timed out). One blip
      # must not fail the whole pipeline.
      - name: Install dependencies (npm)
        if: ${{ inputs.package-manager == 'npm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "::warning::npm ci attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Install dependencies (pnpm)
        if: ${{ inputs.package-manager == 'pnpm' }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            pnpm install --frozen-lockfile && exit 0
            echo "::warning::pnpm install attempt $attempt failed, retrying in 15s..."
            # A failed attempt can leave a dependency half-built — e.g.
            # electron's postinstall aborts mid binary-download on a
            # transient "socket hang up". pnpm does NOT re-run that
            # postinstall on the next `pnpm install`: the package is
            # already linked into node_modules, so the retry "succeeds"
            # with electron's binary still missing and the e2e job later
            # dies with "Electron failed to install correctly" (Release
            # Alpha run #266). Wipe node_modules so the retry is a clean
            # install that re-runs every postinstall. The pnpm store and
            # the Electron binary cache survive, so it stays a fast relink.
            rm -rf node_modules
            sleep 15
          done
          echo "::error::pnpm install failed after 3 attempts"
          exit 1
      - name: Run tests
        run: ${{ inputs.package-manager }} run test
        timeout-minutes: 5

  build:
    if: ${{ inputs.run-build }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - name: Clean workspace
        # Only the previous build's working files are removed here. The
        # Electron binary cache (~/Library/Caches/electron, ~/.cache/electron)
        # is intentionally KEPT: wiping it forced every self-hosted run to
        # re-download Electron, and concurrent jobs sharing a runner host
        # exhausted the connection ("socket hang up"). The cache is keyed by
        # Electron version and integrity-checked, so stale entries are harmless.
        run: rm -rf node_modules dist out .tsbuildinfo coverage tmp
      - name: Install Electron system dependencies (Linux)
