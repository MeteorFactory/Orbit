name: CI Node.js

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      package-manager:
        description: "Package manager to use (npm or pnpm)"
        type: string
        default: "npm"
      pnpm-version:
        description: "pnpm version (only used when package-manager is pnpm)"
        type: string
        default: "10"
      os-matrix:
        description: "JSON array of runner OS labels"
        type: string
        default: '["ubuntu-latest"]'
      run-lint:
        description: "Run lint job"
        type: boolean
        default: true
      run-typecheck:
        description: "Run typecheck job"
        type: boolean
        default: true
      run-test:
        description: "Run test job"
        type: boolean
        default: true
      run-build:
        description: "Run build job"
        type: boolean
        default: true
      artifact-path:
        description: "Path to upload as build artifact (e.g. dist/). Leave empty to skip upload"
        type: string
        default: ""
      artifact-retention-days:
        description: "Number of days to retain uploaded artifacts"
        type: number
        default: 7

jobs:
  lint:
    if: ${{ inputs.run-lint }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run lint

  typecheck:
    if: ${{ inputs.run-typecheck }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run typecheck

  test:
    if: ${{ inputs.run-test }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run test

  build:
    if: ${{ inputs.run-build }}
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Enable pnpm via corepack
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable && corepack prepare pnpm@${{ inputs.pnpm-version }} --activate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ matrix.os != 'self-hosted' && inputs.package-manager || '' }}
      - run: npm ci
        if: ${{ inputs.package-manager == 'npm' }}
      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.package-manager == 'pnpm' }}
      - run: ${{ inputs.package-manager }} run build
      - uses: actions/upload-artifact@v5
        if: ${{ inputs.artifact-path != '' }}
        with:
          name: build-${{ matrix.os }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.artifact-retention-days }}
